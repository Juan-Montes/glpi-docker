; ─── Ajustes PHP para GLPI ───────────────────────────────

; Memoria y tiempos de ejecución
memory_limit       = 256M
max_execution_time = 300
max_input_time     = 300

; Subida de archivos (adjuntos en tickets)
upload_max_filesize = 50M
post_max_size       = 50M
max_file_uploads    = 20

; Zona horaria
date.timezone = America/Mexico_City

; Seguridad
expose_php         = Off
display_errors     = Off
log_errors         = On
error_log          = /var/log/php_errors.log

; Sesiones
session.cookie_httponly = 1
session.use_strict_mode = 1
