version: "3.9"

# ─────────────────────────────────────────────────────────
#  GLPI Stack — Help Desk & Asset Management
#  Servicios: mariadb · glpi (php-fpm) · nginx
# ─────────────────────────────────────────────────────────

services:

  # ── Base de Datos ──────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: glpi_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - glpi_internal
    # La base de datos NO se expone al exterior en producción
    # Solo accesible dentro de la red interna Docker
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    # Límites de recursos (ajustar según entorno)
    deploy:
      resources:
        limits:
          memory: 512M

  # ── GLPI (PHP-FPM) ─────────────────────────────────────
  glpi:
    image: diouxx/glpi:${GLPI_VERSION}
    container_name: glpi_app
    restart: unless-stopped
    environment:
      TIMEZONE: ${TZ}
      MARIADB_HOST: mariadb
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - ./data/glpi:/var/www/html/glpi
      - ./config/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - glpi_internal
    depends_on:
      mariadb:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx (Proxy Inverso) ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: glpi_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/glpi.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/nginx/logs:/var/log/nginx
    networks:
      - glpi_internal
    depends_on:
      - glpi
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M

# ─── Redes ─────────────────────────────────────────────
networks:
  glpi_internal:
    driver: bridge
    # Red interna: los contenedores se comunican entre sí
    # pero están aislados del exterior salvo Nginx
    internal: false

# ─── Volúmenes nombrados (alternativa a bind mounts) ───
# Usando bind mounts (./data/) para facilitar backups y acceso directo
