server {
    listen 80;
    server_name _;
    root /var/www/html/glpi/public;

    # Charset y logs
    charset utf-8;
    access_log /var/log/nginx/glpi_access.log;
    error_log  /var/log/nginx/glpi_error.log;

    # Tamaño máximo de subida (para adjuntos en tickets)
    client_max_body_size 50M;

    # Seguridad — cabeceras básicas
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin" always;

    # Ocultar versión de Nginx
    server_tokens off;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM — pasar al contenedor glpi
    location ~ \.php$ {
        fastcgi_pass   glpi:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Bloquear acceso a archivos sensibles
    location ~ ^/(config|files|install)/ {
        deny all;
        return 403;
    }

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
